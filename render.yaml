services:
  # Backend API
  - type: web
    name: infosec-agent-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: FALLBACK_PROVIDERS
        value: groq,google,cerebras
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: google
      - key: GOOGLE_EMBEDDING_MODEL
        value: models/gemini-embedding-001
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: infosec-data
      mountPath: /app/data
      sizeGB: 1

  # Frontend
  - type: web
    name: infosec-agent-ui
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
